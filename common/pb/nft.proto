syntax = "proto3";

package pb.common;

option go_package = "/common/pb";

message InscribeTag {
    int32 id = 1;
    bytes data = 2;
}


message InscribeBaseContentV2 {
    string inscription_id = 1;
    uint64 inscription_address = 2;
    int32 block_height = 3;
    int64 block_time = 4;
    uint64 content_id = 7;
    repeated InscribeTag tags = 8;
    int64 id = 15;          // nftId
    int64 sat = 16;         // ordinal
    uint64 output = 17;     // inscribing output
    int64 outpoint = 18;    // offset in output when inscribing
    int32 curse_type = 19;
    int32 reinscription = 20;
    string typeName = 21;
    bytes user_data = 22;
}


message InscribeBaseContent {
    string inscription_id = 1;
    uint64 inscription_address = 2;
    int32 block_height = 3;
    int64 block_time = 4;
    bytes content_type = 5;
    bytes content = 6;
    uint64 content_id = 7;
    bytes meta_protocol = 8;
    bytes meta_data = 9;
    bytes content_encoding = 10;
    repeated string parents = 11;
    string delegate = 12;
    bytes properties = 13;
    bytes property_encoding = 14;
    int64 id = 15;          // nftId
    int64 sat = 16;         // ordinal
    uint64 output = 17;     // inscribing output
    int64 outpoint = 18;    // offset in output when inscribing
    int32 curse_type = 19;
    int32 reinscription = 20;
    string typeName = 21;
    bytes user_data = 22;
}

message NftsInSat {
    int64 sat = 1;
    uint64 owner_address_id = 2;
    uint64 utxo_id = 3;
    int64  offset = 4;
    int32 curseCount = 5;
    repeated int64 nfts = 6; // nftId
}